<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="guiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="coordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="daemonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="ttyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/></marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,8 L8,4 L0,0 Z" fill="#fbbf24"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" fill="#0f172a" rx="12"/>

  <!-- ===== LAYER 1: GUI ===== -->
  <rect x="100" y="30" width="700" height="70" rx="12" fill="url(#guiGrad)" filter="url(#shadow)"/>
  <text x="450" y="60" text-anchor="middle" fill="white" font-size="18" font-weight="700">GUI — Browser / Canvas</text>
  <text x="450" y="82" text-anchor="middle" fill="#c7d2fe" font-size="12">thin client · any device · accessible from anywhere</text>

  <!-- Arrow GUI → Coordinator -->
  <line x1="450" y1="100" x2="450" y2="130" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== LAYER 2: COORDINATOR ===== -->
  <rect x="100" y="130" width="700" height="80" rx="12" fill="url(#coordGrad)" filter="url(#shadow)"/>
  <text x="450" y="162" text-anchor="middle" fill="white" font-size="18" font-weight="700">Coordinator Server</text>
  <text x="450" y="185" text-anchor="middle" fill="#bae6fd" font-size="12">auth · routing · state persistence · agent registry</text>
  <text x="450" y="200" text-anchor="middle" fill="#bae6fd" font-size="12">agent status detection · Claude/Codex heuristics · hook forwarding</text>

  <!-- Arrows Coordinator → Daemons -->
  <line x1="175" y1="210" x2="175" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="450" y1="210" x2="450" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <line x1="725" y1="210" x2="725" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ===== LAYER 3: DAEMONS ===== -->

  <!-- Daemon 1 -->
  <rect x="50" y="250" width="250" height="370" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="250" width="250" height="44" rx="12" fill="url(#daemonGrad)"/>
  <rect x="50" y="274" width="250" height="20" fill="url(#daemonGrad)"/>
  <text x="175" y="278" text-anchor="middle" fill="white" font-size="15" font-weight="700">Agent Daemon 1</text>
  <text x="175" y="310" text-anchor="middle" fill="#fdba74" font-size="11">host / Incus container / VPS</text>

  <!-- Daemon 2 -->
  <rect x="325" y="250" width="250" height="370" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="325" y="250" width="250" height="44" rx="12" fill="url(#daemonGrad)"/>
  <rect x="325" y="274" width="250" height="20" fill="url(#daemonGrad)"/>
  <text x="450" y="278" text-anchor="middle" fill="white" font-size="15" font-weight="700">Agent Daemon 2</text>
  <text x="450" y="310" text-anchor="middle" fill="#fdba74" font-size="11">host / Incus container / VPS</text>

  <!-- Daemon N -->
  <rect x="600" y="250" width="250" height="370" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="600" y="250" width="250" height="44" rx="12" fill="url(#daemonGrad)"/>
  <rect x="600" y="274" width="250" height="20" fill="url(#daemonGrad)"/>
  <text x="725" y="278" text-anchor="middle" fill="white" font-size="15" font-weight="700">Agent Daemon N</text>
  <text x="725" y="310" text-anchor="middle" fill="#fdba74" font-size="11">host / Incus container / VPS</text>

  <!-- ===== DAEMON 1 internals ===== -->
  <rect x="70" y="330" width="210" height="35" rx="6" fill="#334155"/>
  <text x="175" y="352" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">metrics · status · hooks → coordinator</text>

  <!-- TTYs -->
  <line x1="130" y1="380" x2="130" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="220" y1="380" x2="220" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="70" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="117" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>
  <rect x="185" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="232" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>

  <!-- Agents -->
  <line x1="117" y1="440" x2="117" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="232" y1="440" x2="232" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="70" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="117" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">Claude</text>
  <text x="117" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">CLI</text>

  <rect x="185" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="232" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">npm run</text>
  <text x="232" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">dev server</text>

  <!-- ===== DAEMON 2 internals ===== -->
  <rect x="345" y="330" width="210" height="35" rx="6" fill="#334155"/>
  <text x="450" y="352" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">metrics · status · hooks → coordinator</text>

  <line x1="405" y1="380" x2="405" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="495" y1="380" x2="495" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="345" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="392" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>
  <rect x="460" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="507" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>

  <line x1="392" y1="440" x2="392" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="507" y1="440" x2="507" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="345" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="392" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">Codex</text>
  <text x="392" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">CLI</text>

  <rect x="460" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="507" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">Kilo</text>
  <text x="507" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">CLI</text>

  <!-- ===== DAEMON N internals ===== -->
  <rect x="620" y="330" width="210" height="35" rx="6" fill="#334155"/>
  <text x="725" y="352" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">metrics · status · hooks → coordinator</text>

  <line x1="680" y1="380" x2="680" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="770" y1="380" x2="770" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="620" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="667" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>
  <rect x="735" y="400" width="95" height="40" rx="6" fill="url(#ttyGrad)"/>
  <text x="782" y="425" text-anchor="middle" fill="white" font-size="12" font-weight="600">TTY</text>

  <line x1="667" y1="440" x2="667" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="782" y1="440" x2="782" y2="465" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="620" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="667" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">Qwen</text>
  <text x="667" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">CLI</text>

  <rect x="735" y="465" width="95" height="50" rx="6" fill="url(#agentGrad)"/>
  <text x="782" y="488" text-anchor="middle" fill="white" font-size="11" font-weight="700">htop</text>
  <text x="782" y="505" text-anchor="middle" fill="#e9d5ff" font-size="9">any CLI</text>

  <!-- ===== Upward arrows: metrics flow ===== -->
  <line x1="190" y1="330" x2="190" y2="215" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowUp)"/>
  <line x1="465" y1="330" x2="465" y2="215" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowUp)"/>
  <line x1="740" y1="330" x2="740" y2="215" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowUp)"/>

  <!-- Legend -->
  <text x="450" y="640" text-anchor="middle" fill="#64748b" font-size="11">AB — agent swarm monitoring &amp; management system</text>

</svg>
